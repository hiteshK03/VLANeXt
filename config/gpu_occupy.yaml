project:
  # [projectname]_[versionname]_[benchmarkname]_[else......]
  name: "VLANeXtV2_v0_libero_spatial_gpu_occupy"
  output_dir: "/data/NTU_slab/draven/checkpoints/VLANeXtV2"
  log_interval: 10
  save_interval: 100000
  use_wandb: false

data:
  dataset_name: "libero"
  # /data/NTU_slab/draven/data/LIBERO_modified
  data_root: "/data/NTU_slab/draven/data/LIBERO_modified"
  # loptions: libero_spatial, libero_object, libero_goal, libero_10
  task_suite_name: "libero_spatial"
  full_sequence: true  # If true, sample every timestep; if false, subsample

  # number of past timesteps
  # proprio: applicable for proprio. or action if "use_proprio_input_vlm=true" or "use_action_input_policy=true"
  # video: also applicable for video input if input_modality="video"
  history_len: 8

  # action chunking length
  future_len: 8

  # shuffle buffer size
  buffer_size: 10000

  # batch training configs
  batch_size: 256  # this is the total batch size across all GPUs, it will be automatically divided by the number of GPUs used
  max_steps: 100000 # 10k for spatial, object, goal; 12k for long (10)
  num_workers: 2

  # vision input controls
  input_modality: "image"   # temporal history, options: "video", "image"

  # camera view, options: "single", "multi"
  view_mode: "multi"
  
  # augmentation (applied to image/video frames before processor)
  augmentation:
    enabled: true
    random_resized_crop:
      scale: [0.8, 1.0]
      ratio: [0.9, 1.1]
    random_brightness: [0.2]
    random_contrast: [0.8, 1.2]
    random_saturation: [0.8, 1.2]
    random_hue: [0.05]
    augment_order:
      - "random_resized_crop"
      - "random_brightness"
      - "random_contrast"
      - "random_saturation"
      - "random_hue"

model:
  # Options: "vlanext", "rt2_baseline"
  model_type: "vlanext"

  # Options: Qwen/Qwen3-VL-2B-Instruct, Qwen/Qwen3-VL-4B-Instruct, google/paligemma-3b-pt-224, meta-llama/Llama-3.2-3B
  lmm_path: "Qwen/Qwen3-VL-2B-Instruct"
  # vision encoder path (only applicable for llama based VLMs)
  vision_encoder_path: "google/siglip2-base-patch16-256"
  # backbone training mode, options: "frozen", "finetune"
  backbone_mode: "finetune"

  # action dimension
  action_dim: 7
  
  # loss type option: "diffusion", "regression", "classification"
  loss_type: "diffusion" # Options: "diffusion", "regression", "classification"
  # diffusion loss configs (applicable if loss_type is "diffusion")
  num_train_timesteps: 1000
  num_inference_timesteps: 10
  scheduler_type: "flow_match" # Options: "ddim", "flow_match"
  # classification loss configs (applicable if loss_type is "classification")
  num_bins: 256
  action_vqvae:
    enabled: false
    frozen: true
    codebook_size: 1024
    hidden_size: 256
    depth: 4
    num_heads: 8
    steps: 1000
    learning_rate: 1.0e-3
  
  # condition type option: "loose", "tight", "soft"
  condition_type: "soft"
  # loose or soft conditioning configs (applicable if condition_type is "loose" or "soft")
  num_queries: 16
  # loose conditioning configs (applicable if condition_type is "loose")
  use_transformer_connector: true
  connector_depth: 2
  connector_num_heads: 4

  # policy configs
  policy_hidden_size: 1024
  policy_depth: 29
  policy_num_heads: 16
  policy_mlp_ratio: 4.0

  # auxiliary future image prediction loss weight (>0 activates)
  future_image_loss_weight: 0.0
  generator_hidden_size: 768
  generator_depth: 29
  generator_num_heads: 12
  generator_mlp_ratio: 4.0
  future_image_mode: "horizon" # Options: "horizon" for predicting the horizon image; "goal" for predicting the final image

  # auxiliary dct loss weight (>0 activates)
  dct_loss_weight: 0.1
  # dct frequency weighting: fraction [0,1] of DCT bins treated as low freq
  dct_freq_split: 0.5
  dct_low_freq_weight: 1.0
  dct_high_freq_weight: 3.0

  # action condition configs
  use_proprio_input_vlm: true
  use_transformer_proprio_projector: false
  projector_depth: 2 # only applicable if use_transformer_proprio_projector=true
  projector_num_heads: 4
  use_action_input_policy: false
  gradient_checkpointing: true

train:
  seed: 2026
  resume_path: "" # path to checkpoint to resume training, empty for fresh start
  pretrained_checkpoint: "" # path to the pretrained model checkpoint
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 5000 # 5% of max steps
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  device: "cuda"
  distributed: true
  dist_backend: "nccl"